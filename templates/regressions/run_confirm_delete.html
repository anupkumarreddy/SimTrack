{% extends "base.html" %}
{% block title %}Delete Run - SimTrack{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto text-center">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">Delete Run</h1>
    <p class="text-gray-600 dark:text-neutral-400 mb-6">Are you sure you want to delete "<strong>{{ object }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex items-center justify-center gap-3">
            <button type="submit" class="inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-red-600 text-white hover:bg-red-700 px-4 py-2">Delete</button>
            <a href="{% url 'run-list' %}" class="inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-gray-200 bg-white text-gray-800 hover:bg-gray-50 px-4 py-2">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
