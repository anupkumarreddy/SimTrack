{% extends "base.html" %}
{% block title %}Reset email sent - SimTrack{% endblock %}
{% block content %}
<div class="mx-auto max-w-md rounded-xl border border-gray-200 bg-white p-6 shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
    <h1 class="mb-3 text-2xl font-bold text-gray-900 dark:text-white">Check your email</h1>
    <p class="text-sm text-gray-600 dark:text-neutral-400">If an account exists for that address, a password reset link has been sent.</p>
    <a href="{% url 'login' %}" class="mt-4 inline-flex text-sm text-blue-600 hover:text-blue-800">Back to sign in</a>
</div>
{% endblock %}
