{% extends "base.html" %}
{% block title %}Add Update - SimTrack{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Add Milestone Update</h1>
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 dark:bg-neutral-800 dark:border-neutral-700">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 dark:text-neutral-300">{{ field.label }}</label>
                <div class="mt-1">{{ field }}</div>
                {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors|striptags }}</p>{% endif %}
            </div>
            {% endfor %}
            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 px-4 py-2">Save</button>
                <a href="{% url 'milestone-detail' view.kwargs.pk %}" class="inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-gray-200 bg-white text-gray-800 hover:bg-gray-50 px-4 py-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
